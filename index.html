<!DOCTYPE html>
<html>
<head>
  <title>SmartEvent AI Ultra</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="topbar">
  <h2>🌍 SmartEvent AI Ultra</h2>
  <div>
    <button id="geoBtn">📍 My Location</button>
    <button id="themeToggle">🌗 Theme</button>
  </div>
</header>

<main class="container">

  <!-- SEARCH -->
  <label for="search">Search place</label>
  <input id="search" placeholder="Search any city or place..." autocomplete="off">
  <div id="suggestions" role="listbox"></div>

  <!-- FAVORITES -->
  <div class="fav-bar">
    <button id="saveFav">⭐ Save</button>
    <select id="favList" aria-label="Favorites"></select>
  </div>

  <!-- MAP -->
  <div class="map-box">
    <iframe id="mapFrame"></iframe>
    <canvas id="mapCanvas"></canvas>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="analyzeBtn">Analyze</button>
    <button id="voiceBtn">🎤 Voice</button>
    <button id="autoBtn">⏱️ Auto: OFF</button>
    <button id="resetBtn">Reset</button>
  </div>

  <!-- OUTPUT -->
  <section id="output" aria-live="polite"></section>

  <!-- CHART -->
  <canvas id="chart"></canvas>

</main>

<script src="script.js"></script>
</body>
</html>
